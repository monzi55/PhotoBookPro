<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フォトアルバムPDF作成</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'activated') {
                                window.location.reload();
                            }
                        });
                    });
                }).catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <h1><i data-lucide="camera"></i> PhotoBook Pro <span class="version">V2.1.3</span></h1>
                <div class="header-actions">
                    <button id="master-btn" class="icon-btn hidden" title="定型文編集">
                        <i data-lucide="settings"></i>
                    </button>
                </div>
            </div>
        </header>

        <main>
            <!-- 1. Mode Selection Screen -->
            <div id="mode-selection" class="mode-selection">
                <div class="selection-header">
                    <h2>作成する写真帳の様式を選択</h2>
                    <p>用途に合わせて最適なレイアウトを自動生成します。</p>
                </div>
                <div class="mode-grid">
                    <button class="mode-card" data-mode="registration">
                        <div class="mode-icon"><i data-lucide="file-text"></i></div>
                        <div class="mode-info">
                            <h3>登記用写真帳</h3>
                            <p>一般的な登記申請用の6枚配置レイアウト</p>
                        </div>
                        <i data-lucide="chevron-right"></i>
                    </button>
                    <button class="mode-card" data-mode="boundary">
                        <div class="mode-icon"><i data-lucide="map-pin"></i></div>
                        <div class="mode-info">
                            <h3>準拠点・境界点用</h3>
                            <p>遠景・近景のペア配置と詳細情報の入力</p>
                        </div>
                        <i data-lucide="chevron-right"></i>
                    </button>
                    <button class="mode-card" data-mode="section">
                        <div class="mode-icon"><i data-lucide="layout"></i></div>
                        <div class="mode-info">
                            <h3>断面用写真帳</h3>
                            <p>写真を左寄せし、右側に詳細な備考欄を配置</p>
                        </div>
                        <i data-lucide="chevron-right"></i>
                    </button>
                    <button class="mode-card" data-mode="sitesurvey">
                        <div class="mode-icon"><i data-lucide="land-plot"></i></div>
                        <div class="mode-info">
                            <h3>敷地調査 現況写真</h3>
                            <p>A3横に9枚配置の現況写真レイアウト</p>
                        </div>
                        <i data-lucide="chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- 1.5 Master Settings Screen (Initially Hidden) -->
            <div id="master-settings-screen" class="hidden">
                <div class="list-header">
                    <div class="list-title-group">
                        <button id="back-to-modes-from-settings" class="icon-btn" title="戻る">
                            <i data-lucide="arrow-left"></i>
                        </button>
                        <h2>定型文の設定: <span id="settings-mode-label"></span></h2>
                    </div>
                    <div class="list-actions">
                        <button id="close-settings-btn" class="btn accent-btn">
                            完了 <i data-lucide="check"></i>
                        </button>
                    </div>
                </div>
                <div class="master-settings-body">
                    <div class="tabs" id="settings-tabs">
                        <!-- Dynamic tabs -->
                    </div>
                    <div class="master-input-group">
                        <input type="text" id="new-master-input" placeholder="新しい項目を追加...">
                        <button id="add-master-btn" class="btn primary-btn small">追加</button>
                    </div>
                    <ul id="master-settings-list" class="master-list"></ul>
                </div>
            </div>

            <!-- 2. Photo Loading Screen (Initially Hidden) -->
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">
                    <i data-lucide="image-plus"></i>
                </div>
                <h2 id="empty-state-title">写真を読み込んでください</h2>
                <p>デバイスから複数の写真を選択して、PDF写真帳を簡単に作成できます。</p>
                <div class="empty-actions">
                    <label for="image-input" class="btn primary-btn">
                        <i data-lucide="plus"></i> 写真を選択
                    </label>
                    <button id="back-to-modes" class="btn secondary-btn">
                        様式選択に戻る
                    </button>
                </div>
                <input type="file" id="image-input" accept="image/*" multiple hidden>
            </div>

            <!-- 3. Photo List / Edit Screen (Initially Hidden) -->
            <div id="photo-list-container" class="hidden">
                <div class="list-header">
                    <div class="list-title-group">
                        <button id="back-to-upload" class="icon-btn" title="戻る">
                            <i data-lucide="arrow-left"></i>
                        </button>
                        <span id="current-mode-label" class="badge">登記用</span>
                        <span id="photo-count">0枚の写真</span>
                    </div>
                </div>
                <div id="photo-list" class="photo-grid">
                    <!-- Photos will be injected here -->
                </div>
                <div class="list-actions-bottom" style="display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; margin-bottom: 2rem;">
                    <label for="image-input-append" class="btn secondary-btn">
                        <i data-lucide="plus"></i> 写真を追加
                    </label>
                    <input type="file" id="image-input-append" accept="image/*" multiple hidden>
                    <button id="generate-pdf-btn" class="btn accent-btn">
                        <i data-lucide="file-text"></i> PDF出力
                    </button>
                </div>
            </div>
        </main>

        <!-- Master Data Modal -->
        <div id="master-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>定型文の編集</h2>
                    <button class="close-modal"><i data-lucide="x"></i></button>
                </div>
                <div class="modal-body">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="titles">タイトル</button>
                        <button class="tab-btn" data-tab="remarks">備考</button>
                    </div>
                    <div class="tab-content" id="titles-tab">
                        <div class="master-input-group">
                            <input type="text" id="new-title" placeholder="新しいタイトルを追加...">
                            <button id="add-title-btn" class="btn primary-btn small">追加</button>
                        </div>
                        <ul id="title-list" class="master-list"></ul>
                    </div>
                    <div class="tab-content hidden" id="remarks-tab">
                        <div class="master-input-group">
                            <input type="text" id="new-remark" placeholder="新しい備考を追加...">
                            <button id="add-remark-btn" class="btn primary-btn small">追加</button>
                        </div>
                        <ul id="remark-list" class="master-list"></ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Selection Modal for Title/Remarks -->
        <div id="selection-modal" class="modal hidden">
            <div class="modal-content selection-content">
                <div class="modal-header">
                    <h2 id="selection-title">選択してください</h2>
                    <button class="close-modal"><i data-lucide="x"></i></button>
                </div>
                <div id="selection-options" class="selection-grid">
                    <!-- Options injected here -->
                </div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="overlay hidden">
            <div class="spinner"></div>
            <p id="loading-text">処理中...</p>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
